<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong (Classic)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #181818; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    canvas { background: #222; display: block; margin: 0 auto; border: 2px solid #60a5fa; }
    h1 { margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>Pong</h1>
  <canvas id="pong" width="480" height="320"></canvas>
  <script>
    const canvas = document.getElementById('pong');
    const ctx = canvas.getContext('2d');
    const paddleHeight = 60, paddleWidth = 10, ballRadius = 8;
    let leftY = canvas.height/2 - paddleHeight/2, rightY = canvas.height/2 - paddleHeight/2;
    let leftScore = 0, rightScore = 0;
    let ballX = canvas.width/2, ballY = canvas.height/2, ballDX = 3, ballDY = 2;
    let upPressed = false, downPressed = false;
    document.addEventListener('keydown', e => { if (e.key === 'ArrowUp') upPressed = true; if (e.key === 'ArrowDown') downPressed = true; });
    document.addEventListener('keyup', e => { if (e.key === 'ArrowUp') upPressed = false; if (e.key === 'ArrowDown') downPressed = false; });
    function drawPaddle(x, y) { ctx.fillRect(x, y, paddleWidth, paddleHeight); }
    function drawBall() { ctx.beginPath(); ctx.arc(ballX, ballY, ballRadius, 0, Math.PI*2); ctx.fill(); }
    function drawScore() { ctx.font = '20px monospace'; ctx.fillText(leftScore, canvas.width/4, 30); ctx.fillText(rightScore, 3*canvas.width/4, 30); }
    function resetBall() { ballX = canvas.width/2; ballY = canvas.height/2; ballDX = -ballDX; ballDY = 2 * (Math.random() > 0.5 ? 1 : -1); }
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#fff';
      drawPaddle(0, leftY);
      drawPaddle(canvas.width-paddleWidth, rightY);
      drawBall();
      drawScore();
      // Move paddles
      if (upPressed && rightY > 0) rightY -= 4;
      if (downPressed && rightY < canvas.height-paddleHeight) rightY += 4;
      // Simple AI for left paddle
      if (ballY < leftY + paddleHeight/2 && leftY > 0) leftY -= 2.5;
      if (ballY > leftY + paddleHeight/2 && leftY < canvas.height-paddleHeight) leftY += 2.5;
      // Move ball
      ballX += ballDX; ballY += ballDY;
      if (ballY < ballRadius || ballY > canvas.height-ballRadius) ballDY = -ballDY;
      // Paddle collision
      if (ballX-ballRadius < paddleWidth && ballY > leftY && ballY < leftY+paddleHeight) ballDX = -ballDX;
      if (ballX+ballRadius > canvas.width-paddleWidth && ballY > rightY && ballY < rightY+paddleHeight) ballDX = -ballDX;
      // Score
      if (ballX < 0) { rightScore++; resetBall(); }
      if (ballX > canvas.width) { leftScore++; resetBall(); }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
