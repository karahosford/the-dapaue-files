<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #181818; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .player-container { background: #232323; border-radius: 10px; box-shadow: 0 2px 16px #0008; padding: 24px; }
    h1 { margin-bottom: 18px; font-size: 1.2em; }
    iframe { border: none; border-radius: 8px; box-shadow: 0 2px 16px #0008; }
  </style>
</head>
<body>
  <div class="player-container">
    <h1>YouTube Video Player</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/tA0YngqaWFs" allowfullscreen></iframe>
  </div>
</body>
</html>
