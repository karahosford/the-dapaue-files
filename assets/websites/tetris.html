<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tetris</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background: #181818; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    canvas { background: #222; display: block; margin: 0 auto; border: 2px solid #60a5fa; }
    h1 { margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>Tetris</h1>
  <canvas id="tetris" width="200" height="400"></canvas>
  <script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const COLS = 10, ROWS = 20, BLOCK = 20;
    let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    const COLORS = [null, '#60a5fa', '#fbbf24', '#34d399', '#f472b6', '#a78bfa', '#f87171', '#fff'];
    const SHAPES = [
      [],
      [[1,1,1,1]],
      [[2,2],[2,2]],
      [[0,3,0],[3,3,3]],
      [[4,4,0],[0,4,4]],
      [[0,5,5],[5,5,0]],
      [[6,0,0],[6,6,6]],
      [[0,0,7],[7,7,7]]
    ];
    let current = {shape: [], color: 0, x: 0, y: 0};
    let dropInterval = 500, dropTimer = 0, gameOver = false;
    function resetPiece() {
      const type = Math.floor(Math.random()*7)+1;
      current.shape = SHAPES[type];
      current.color = type;
      current.x = Math.floor((COLS-current.shape[0].length)/2);
      current.y = 0;
      if (collides(0,0)) gameOver = true;
    }
    function collides(dx,dy) {
      for (let y=0; y<current.shape.length; ++y)
        for (let x=0; x<current.shape[y].length; ++x)
          if (current.shape[y][x] && (board[current.y+y+dy]?.[current.x+x+dx] || current.x+x+dx<0 || current.x+x+dx>=COLS || current.y+y+dy>=ROWS))
            return true;
      return false;
    }
    function merge() {
      for (let y=0; y<current.shape.length; ++y)
        for (let x=0; x<current.shape[y].length; ++x)
          if (current.shape[y][x]) board[current.y+y][current.x+x]=current.color;
    }
    function clearLines() {
      for (let y=ROWS-1; y>=0; --y) {
        if (board[y].every(v=>v)) {
          board.splice(y,1);
          board.unshift(Array(COLS).fill(0));
          y++;
        }
      }
    }
    function drawBlock(x,y,color) {
      ctx.fillStyle = COLORS[color];
      ctx.fillRect(x*BLOCK, y*BLOCK, BLOCK-1, BLOCK-1);
    }
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for (let y=0; y<ROWS; ++y)
        for (let x=0; x<COLS; ++x)
          if (board[y][x]) drawBlock(x,y,board[y][x]);
      for (let y=0; y<current.shape.length; ++y)
        for (let x=0; x<current.shape[y].length; ++x)
          if (current.shape[y][x]) drawBlock(current.x+x,current.y+y,current.color);
      if (gameOver) {
        ctx.fillStyle = '#f87171';
        ctx.font = '24px monospace';
        ctx.fillText('GAME OVER', 20, 200);
      }
    }
    function drop() {
      if (!gameOver) {
        if (!collides(0,1)) current.y++;
        else { merge(); clearLines(); resetPiece(); }
        draw();
      }
    }
    function move(dx) {
      if (!collides(dx,0)) current.x+=dx;
      draw();
    }
    function rotate() {
      const shape = current.shape.map((_,i)=>current.shape.map(r=>r[i])).reverse();
      const old = current.shape;
      current.shape = shape;
      if (collides(0,0)) current.shape = old;
      draw();
    }
    document.addEventListener('keydown', e => {
      if (gameOver) return;
      if (e.key==='ArrowLeft') move(-1);
      if (e.key==='ArrowRight') move(1);
      if (e.key==='ArrowDown') drop();
      if (e.key==='ArrowUp') rotate();
    });
    function loop(ts) {
      if (!dropTimer) dropTimer = ts;
      if (ts-dropTimer>dropInterval) { drop(); dropTimer=ts; }
      requestAnimationFrame(loop);
    }
    resetPiece();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
