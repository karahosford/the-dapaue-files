<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <title>Symbol Network Morphing Shape + Clusters</title> <style>
      body { padding: 0; margin: 0; overflow: hidden; background-color: #000; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <script>
      // --- Core Shape Configuration ---
      let shapeRadius = 180; // MODIFIED: Generic radius
      let symbols = ['we', 'see', 'you', 'all', '*', '#', '$', '%', '&', '+', '=', '@', '^', '~', '!', '?', '|', ':', ';', '<', '>', '¶', '§', '†', '‡', '※', '‽', '◊', '‰', '′', '″', '←', '↑', '→', '↓', '↔', '∀', '∂', '∃', '∅', '∆', '∇', '∈', '∑', '∏', '∗', '∘', '∙', '∝', '∞', '∠', '∧', '∨', '∩', '∪', '∫', '∼', '≅', '≈', '≠', '≡', '≤', '≥', '⊂', '⊃', '⊕', '⊗', '⊥', '⋅', '⌈', '⌉', '⌊', '⌋', '░', '▒', '▓', '■', '□', '▲', '△', '▼', '▽', '●', '○', '★', '☆', '☉', '✓', '✗', '✶'];
      let symbolSize = 14;
      let particlesPerFrame = 12;
      let maxParticles = 300;
      let particleInitialDelay = 30;
      let particleMaxLife = 280;
      let bleedSpeed = 0.1;
      let noiseStrength = 0.35;
      let noiseTimeScale = 0.008;

      // --- NEW: Shape Cycling Configuration ---
      let shapeTypes = ['hexagon', 'circle', 'square', 'triangle', 'cross'];
      let currentShapeIndex = 0;
      let holdDuration = 240; // Frames to hold each shape (e.g., 8 seconds at 30fps)
      let shapeTimer = 0;
      let currentShapeType = shapeTypes[currentShapeIndex];
      let shapeVertices = []; // Holds vertices for the current polygon shape
      let boundingBox;      // Bounding box for the current shape

      // --- Cluster Configuration ---
      let maxClusters = 8; // Adjusted back from 20
      let clusterSpawnInterval = 60;
      let minClusterSize = 3; // Adjusted back
      let maxClusterSize = 8;
      let clusterParticleColor;
      let clusterParticleMaxLife = 200;
      let clusterSpeed = 0.8;
      let clusterCohesion = 0.08;
      let clusterNoiseStrength = 0.6;
      let clusterMaxLife = 800;

      // --- Shape Interaction Configuration ---
      // MODIFIED: Renamed variables to be generic
      let shapeInfluenceRadius = shapeRadius * 2.5; // Based on shapeRadius
      let repulsionForce = 0.05; // Adjusted back
      let attractionForce = 0.04;
      let absorptionRadius = shapeRadius * 0.8;     // Based on shapeRadius
      let absorptionChance = 0.3;
      let clusterDamping = 0.98;

      // --- Network Link Configuration ---
      let linkThreshold = 50;
      let linkColor;
      let linkBaseAlpha = 30;

      // --- Glitch Overlay Configuration ---
      let scanlineAlpha = 25; // Adjusted back
      let scanlineSpeed = 0.4;
      let noiseDensity = 700; // Adjusted back
      let blockGlitchChance = 0.08; // Adjusted back
      let blockGlitchColor;
      let noiseColor;
      let scanlineColor;

      // --- Zoom Configuration ---
      let zoomFactor = 1.5; // Adjusted back

      // --- Globals ---
      let particles = [];
      let clusters = [];
      let nextClusterId = 0;
      let time = 0;
      let centerX, centerY;
      let scanlineOffset = 0;
      let frameCounter = 0;

      // --- P5.js Setup Function ---
      function setup() {
        createCanvas(windowWidth, windowHeight);
        textFont('courier new'); textSize(symbolSize); textAlign(CENTER, CENTER);
        frameRate(30);

        centerX = width / 2; centerY = height / 2;

        // Define colors
        scanlineColor = color(0, 0, 0, scanlineAlpha);
        noiseColor = color(150, 150, 150, 40);
        linkColor = color(180, 40, 50, linkBaseAlpha);
        clusterParticleColor = color(255, 255, 255);

        // NEW: Initial shape calculation
        calculateVerticesForShape(currentShapeType);

        console.log("Setup complete. Symbol Network Morphing Shape + Clusters.");
      }

      // --- NEW: Vertex Calculation Functions ---
      function calculateHexagonVertices(r) {
          let vertices = [];
          for (let i = 0; i < 6; i++) {
              let angle = PI / 3 * i - PI / 6; // Start rotated slightly
              vertices.push(createVector(centerX + r * cos(angle), centerY + r * sin(angle)));
          }
          return vertices;
      }

      function calculateSquareVertices(r) {
          let halfSide = r / sqrt(2); // Calculate half-side for inscribed square
          let vertices = [];
          vertices.push(createVector(centerX - halfSide, centerY - halfSide)); // Top-left
          vertices.push(createVector(centerX + halfSide, centerY - halfSide)); // Top-right
          vertices.push(createVector(centerX + halfSide, centerY + halfSide)); // Bottom-right
          vertices.push(createVector(centerX - halfSide, centerY + halfSide)); // Bottom-left
          return vertices;
      }

      function calculateTriangleVertices(r) {
           // Equilateral triangle pointing up, inscribed in radius r
          let vertices = [];
          let angleOffset = -PI / 2; // Start pointing up
          for (let i = 0; i < 3; i++) {
              let angle = TWO_PI / 3 * i + angleOffset;
              vertices.push(createVector(centerX + r * cos(angle), centerY + r * sin(angle)));
          }
          return vertices;
      }

      function calculateCrossVertices(r, thicknessRatio = 0.3) {
          let vertices = [];
          let w = r * thicknessRatio; // half-width of arms
          let l = r; // length of arms from center
          // Points relative to center, ordered for polygon test
          vertices.push(createVector(-w, l)); vertices.push(createVector(w, l));
          vertices.push(createVector(w, w));  vertices.push(createVector(l, w));
          vertices.push(createVector(l, -w)); vertices.push(createVector(w, -w));
          vertices.push(createVector(w, -l)); vertices.push(createVector(-w, -l));
          vertices.push(createVector(-w, -w));vertices.push(createVector(-l, -w));
          vertices.push(createVector(-l, w)); vertices.push(createVector(-w, w));
          // Translate to actual center
          for (let v of vertices) { v.add(centerX, centerY); }
          return vertices;
      }

       // --- NEW: Master Shape Vertex/Boundary Calculation ---
      function calculateVerticesForShape(shapeType) {
          console.log("Switching to shape:", shapeType); // Log shape changes
          shapeVertices = []; // Clear previous vertices

          switch (shapeType) {
              case 'hexagon':
                  shapeVertices = calculateHexagonVertices(shapeRadius);
                  break;
              case 'square':
                  shapeVertices = calculateSquareVertices(shapeRadius);
                  break;
              case 'triangle':
                  shapeVertices = calculateTriangleVertices(shapeRadius);
                  break;
              case 'cross':
                  shapeVertices = calculateCrossVertices(shapeRadius);
                  break;
              case 'circle':
                  // Circle doesn't use vertices for check, handled by radius
                  // But we still need a bounding box for polygon spawn method fallback
                  boundingBox = { minX: centerX - shapeRadius, maxX: centerX + shapeRadius, minY: centerY - shapeRadius, maxY: centerY + shapeRadius };
                  return; // Exit early for circle
          }

          // Calculate bounding box for polygon shapes
          let minX = width, maxX = 0, minY = height, maxY = 0;
          for (let v of shapeVertices) {
              if (v.x < minX) minX = v.x; if (v.x > maxX) maxX = v.x;
              if (v.y < minY) minY = v.y; if (v.y > maxY) maxY = v.y;
          }
          boundingBox = { minX: minX, maxX: maxX, minY: minY, maxY: maxY };
      }


      // --- NEW: Shape Update Logic ---
      function updateShapeDefinition() {
          shapeTimer++;
          if (shapeTimer >= holdDuration) {
              shapeTimer = 0;
              // Cycle to the next shape
              currentShapeIndex = (currentShapeIndex + 1) % shapeTypes.length;
              currentShapeType = shapeTypes[currentShapeIndex];
              // Recalculate vertices/boundaries for the new shape
              calculateVerticesForShape(currentShapeType);
          }
      }

      // --- P5.js Draw Function ---
      function draw() {
        background(20, 0, 5, 40);
        frameCounter++;

        updateShapeDefinition(); // NEW: Update shape state and definition if needed

        push(); // Apply zoom
        translate(width / 2, height / 2); scale(zoomFactor); translate(-width / 2, -height / 2);

        maybeSpawnCluster();
        spawnParticlesInside(); // MODIFIED: Spawns based on currentShapeType
        updateClusters();
        updateParticles();
        drawParticleLinks();
        drawParticles(); // MODIFIED: Draws based on particle type

        // Optional: Draw the current shape outline for debugging/visualization
        // push(); noFill(); stroke(255, 50); strokeWeight(1);
        // if (currentShapeType === 'circle') { ellipse(centerX, centerY, shapeRadius * 2); }
        // else if (shapeVertices.length > 0) {
        //    beginShape(); for (let v of shapeVertices) { vertex(v.x, v.y); } endShape(CLOSE);
        // }
        // pop();

        drawScanlines();
        drawStaticNoise(noiseDensity);
        if (random(1) < blockGlitchChance) { drawBlockGlitch(); }

        pop(); // Restore drawing state
        time += noiseTimeScale;
      }

      // --- Cluster Spawning ---
      function maybeSpawnCluster() { /* ... (same as before) ... */
           if (frameCounter % clusterSpawnInterval === 0 && clusters.length < maxClusters && particles.length < maxParticles - maxClusterSize) {
               spawnCluster();
           }
      }
      function spawnCluster() { /* ... (same as before) ... */
           let edgeMargin = 50; let spawnX, spawnY; let side = floor(random(4));
           if (side === 0) { spawnX = random(width); spawnY = -edgeMargin; } else if (side === 1) { spawnX = random(width); spawnY = height + edgeMargin; } else if (side === 2) { spawnX = -edgeMargin; spawnY = random(height); } else { spawnX = width + edgeMargin; spawnY = random(height); }
           let targetX = centerX + random(-width/4, width/4); let targetY = centerY + random(-height/4, height/4);
           let angleToCenter = atan2(targetY - spawnY, targetX - spawnX);
           let cluster = { id: nextClusterId++, x: spawnX, y: spawnY, vx: cos(angleToCenter) * clusterSpeed, vy: sin(angleToCenter) * clusterSpeed, particles: [], state: 'wandering', targetAbsorption: false, life: clusterMaxLife, maxLife: clusterMaxLife };
           let numParticles = floor(random(minClusterSize, maxClusterSize + 1));
           for (let i = 0; i < numParticles; i++) {
               if (particles.length >= maxParticles) break;
               let offsetRadius = random(5, 15); let offsetAngle = random(TWO_PI);
               let pX = cluster.x + cos(offsetAngle) * offsetRadius; let pY = cluster.y + sin(offsetAngle) * offsetRadius;
               let initialOffsetX = pX - cluster.x; let initialOffsetY = pY - cluster.y;
               let particle = { x: pX, y: pY, vx: 0, vy: 0, delay: 0, symbol: random(symbols), life: clusterParticleMaxLife, maxLife: clusterParticleMaxLife, initialAlpha: random(180, 240), type: 'cluster', clusterId: cluster.id, initialOffsetX: initialOffsetX, initialOffsetY: initialOffsetY };
               particles.push(particle); cluster.particles.push(particle);
           }
           if(cluster.particles.length > 0) { clusters.push(cluster); }
      }

      // --- MODIFIED: Particle Spawning Inside Current Shape ---
       function spawnParticlesInside() {
          if (particles.length >= maxParticles) return;
          let attempts = 0; const maxAttempts = 20; // Allow more attempts

          for (let i = 0; i < particlesPerFrame && particles.length < maxParticles && attempts < maxAttempts * particlesPerFrame; i++) {
              let spawnX, spawnY;
              let pointIsInside = false; // Flag to check if particle is valid

              if (currentShapeType === 'circle') {
                  // Efficient spawning for circle
                  let angle = random(TWO_PI);
                  let rad = sqrt(random()) * shapeRadius; // Uniform distribution
                  spawnX = centerX + cos(angle) * rad;
                  spawnY = centerY + sin(angle) * rad;
                  pointIsInside = true; // Guaranteed inside by generation method
              } else {
                  // Spawning for polygons using bounding box + check
                  if (!boundingBox) return; // Safety check if bounding box not calculated yet
                  spawnX = random(boundingBox.minX, boundingBox.maxX);
                  spawnY = random(boundingBox.minY, boundingBox.maxY);
                  attempts++; // Increment attempts only for bounding box method

                  if (isPointInCurrentShape(spawnX, spawnY)) {
                      pointIsInside = true;
                  }
              }

              // --- Create Particle (if point is valid) ---
              if (pointIsInside) {
                  let directionVector = createVector(spawnX - centerX, spawnY - centerY);
                  if (directionVector.magSq() < 1) directionVector.set(random(-1, 1), random(-1, 1));
                  directionVector.normalize();
                  directionVector.rotate(random(-PI / 6, PI / 6));

                  let newParticle = {
                    x: spawnX, y: spawnY,
                    vx: directionVector.x * bleedSpeed * random(0.5, 1.2),
                    vy: directionVector.y * bleedSpeed * random(0.5, 1.2),
                    delay: particleInitialDelay, symbol: random(symbols),
                    life: particleMaxLife, maxLife: particleMaxLife,
                    initialAlpha: random(200, 255),
                    type: 'inside',
                    clusterId: null
                  };
                  particles.push(newParticle);
                  if (currentShapeType !== 'circle') {
                      attempts = 0; // Reset attempts on successful polygon spawn
                  }
              } else {
                  // Point was not inside (only possible for polygon check)
                  i--; // Decrement loop counter to try again for this particle index
              }
          }
      }


      // --- MODIFIED: Check if Point is Inside the Current Shape ---
      function isPointInCurrentShape(x, y) {
          if (currentShapeType === 'circle') {
              // Circle check: distance from center < radius
              return dist(x, y, centerX, centerY) < shapeRadius;
          } else {
              // Polygon check: Ray casting algorithm (works for convex/concave)
              let inside = false;
              if (!shapeVertices || shapeVertices.length < 3) return false; // Need at least 3 vertices for polygon

              for (let i = 0, j = shapeVertices.length - 1; i < shapeVertices.length; j = i++) {
                  let xi = shapeVertices[i].x, yi = shapeVertices[i].y;
                  let xj = shapeVertices[j].x, yj = shapeVertices[j].y;

                  // Check if the point is exactly on a horizontal vertex - adjust slightly to avoid issues
                  // This is a simplified way to handle edge cases, might not be perfect
                  // if (((yi > y && yj < y) || (yj > y && yi < y)) && yi === y) y += 0.0001;

                  let intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                  if (intersect) inside = !inside;
              }
              return inside;
          }
      }


      // --- Find Cluster Helper ---
      function findClusterById(id) { /* ... (same as before) ... */
          for (let cluster of clusters) { if (cluster.id === id) { return cluster; } } return null;
      }

      // --- Update Clusters ---
       function updateClusters() { /* ... (same as before, uses shapeInfluenceRadius/absorptionRadius) ... */
            for (let i = clusters.length - 1; i >= 0; i--) {
                let cluster = clusters[i]; cluster.life--;
                if (cluster.life <= 0) { clusters.splice(i, 1); continue; }
                let dx = centerX - cluster.x; let dy = centerY - cluster.y;
                let distSq = dx * dx + dy * dy; let dist = sqrt(distSq);
                cluster.state = 'wandering';
                if (dist < shapeInfluenceRadius) { // MODIFIED: Uses generic name
                    if (!cluster.targetAbsorption && cluster.state !== 'repelled' && cluster.state !== 'attracted') { if (random(1) < absorptionChance) { cluster.targetAbsorption = true; } }
                    if (cluster.targetAbsorption) {
                        cluster.state = 'attracted';
                        let forceMagnitude = attractionForce;
                        cluster.vx += (dx / dist) * forceMagnitude; cluster.vy += (dy / dist) * forceMagnitude;
                        if (dist < absorptionRadius) { // MODIFIED: Uses generic name
                            cluster.state = 'absorbing';
                             for(let p of cluster.particles) {
                                 p.type = 'inside'; p.life = particleMaxLife * 0.8; p.maxLife = particleMaxLife; p.delay = 0;
                                 let burstDir = createVector(p.x - centerX, p.y - centerY).normalize().rotate(random(-PI/4, PI/4));
                                 p.vx = burstDir.x * bleedSpeed * 3; p.vy = burstDir.y * bleedSpeed * 3;
                                 p.clusterId = null;
                             }
                            cluster.life = 0;
                        }
                    } else {
                        cluster.state = 'repelled';
                        let forceMagnitude = repulsionForce * (1 - dist / shapeInfluenceRadius); // MODIFIED: Uses generic name
                        cluster.vx -= (dx / dist) * forceMagnitude; cluster.vy -= (dy / dist) * forceMagnitude;
                    }
                } else { cluster.targetAbsorption = false; }
                cluster.vx *= clusterDamping; cluster.vy *= clusterDamping;
                cluster.x += cluster.vx; cluster.y += cluster.vy;
                if (cluster.x < 0 || cluster.x > width) cluster.vx *= -0.8; if (cluster.y < 0 || cluster.y > height) cluster.vy *= -0.8;
            }
       }

      // --- Particle Update Logic ---
      function updateParticles() { /* ... (logic is the same, based on particle type) ... */
          for (let i = particles.length - 1; i >= 0; i--) {
              let p = particles[i]; p.life -= 1;
              if (p.life <= 0) { particles.splice(i, 1); continue; }
              if (p.type === 'inside') {
                  if (p.delay > 0) { p.delay -= 1; p.x += random(-0.1, 0.1); p.y += random(-0.1, 0.1); }
                  else {
                      let noiseAngle = noise(p.x * 0.02, p.y * 0.02, time) * TWO_PI * 3;
                      let currentVX = p.vx + cos(noiseAngle) * noiseStrength; let currentVY = p.vy + sin(noiseAngle) * noiseStrength;
                      let speed = sqrt(currentVX * currentVX + currentVY * currentVY); let maxSpeed = bleedSpeed * 4;
                      if (speed > maxSpeed) { currentVX = (currentVX / speed) * maxSpeed; currentVY = (currentVY / speed) * maxSpeed; }
                      p.vx *= 0.99; p.vy *= 0.99;
                      p.x += currentVX; p.y += currentVY;
                  }
              } else if (p.type === 'cluster') {
                  let cluster = findClusterById(p.clusterId);
                  if (cluster) {
                      let targetX = cluster.x + p.initialOffsetX; let targetY = cluster.y + p.initialOffsetY;
                      let cohesionX = (targetX - p.x) * clusterCohesion; let cohesionY = (targetY - p.y) * clusterCohesion;
                      let noiseAngle = noise(p.x * 0.05, p.y * 0.05, time * 1.5) * TWO_PI * 4;
                      let noiseX = cos(noiseAngle) * clusterNoiseStrength; let noiseY = sin(noiseAngle) * clusterNoiseStrength;
                      p.x += cohesionX + noiseX; p.y += cohesionY + noiseY;
                  } else { p.life -= 3; p.x += random(-0.2, 0.2); p.y += random(-0.2, 0.2); }
              }
          }
      }

      // --- Draw Particle Links ---
      function drawParticleLinks() { /* ... (same as before) ... */
           strokeWeight(0.5);
           for (let i = 0; i < particles.length; i++) {
               for (let j = i + 1; j < particles.length; j++) {
                   let p1 = particles[i]; let p2 = particles[j]; let d = dist(p1.x, p1.y, p2.x, p2.y);
                   if (d < linkThreshold) { let alpha = map(d, 0, linkThreshold, linkBaseAlpha, 0); linkColor.setAlpha(alpha); stroke(linkColor); line(p1.x, p1.y, p2.x, p2.y); }
               }
           }
      }

      // --- Draw Particles ---
      function drawParticles() { /* ... (same as before, colors based on type) ... */
           noStroke();
           for (let i = particles.length - 1; i >= 0; i--) {
               let p = particles[i]; let alphaLifeRatio = constrain(p.life / p.maxLife, 0, 1);
               let fadeRatio = alphaLifeRatio * alphaLifeRatio; let currentAlpha = map(fadeRatio, 0, 1, 0, p.initialAlpha);
               let particleFillColor;
               if (p.type === 'inside') { particleFillColor = color(180, 20, 40, currentAlpha); } // Crimson
               else if (p.type === 'cluster') { particleFillColor = color(red(clusterParticleColor), green(clusterParticleColor), blue(clusterParticleColor), currentAlpha); } // White
               else { particleFillColor = color(200, 200, 200, currentAlpha * 0.5); } // Fallback
               fill(particleFillColor); text(p.symbol, p.x, p.y);
           }
      }

      // --- Glitch Overlay Functions ---
      function drawScanlines() { /* ... (same as before) ... */ stroke(scanlineColor); strokeWeight(1); scanlineOffset = (scanlineOffset + scanlineSpeed) % 4; for (let i = floor(scanlineOffset); i < height; i += 4) { line(0, i, width, i); } }
      function drawStaticNoise(amount) { /* ... (same as before) ... */ stroke(noiseColor); strokeWeight(1); for (let i = 0; i < amount; i++) { let px = random(width); let py = random(height); point(px, py); if (random(1) < 0.01) { line(px, py, px + random(-3, 3), py + random(-3, 3)); } } }
      function drawBlockGlitch() { /* ... (same as before) ... */ let blockX = random(width); let blockY = random(height); let blockW = random(width * 0.05, width * 0.3); let blockH = random(2, 15); blockGlitchColor = color(random(80, 220), random(80, 220), random(80, 220), random(40, 110)); fill(blockGlitchColor); noStroke(); rect(blockX, blockY, blockW, blockH); }

      // --- Window Resize Handling ---
      function windowResized() {
          resizeCanvas(windowWidth, windowHeight);
          centerX = width / 2; centerY = height / 2;
          // Recalculate vertices for the *current* shape after resize
          calculateVerticesForShape(currentShapeType);
          background(20, 0, 5);
          // clusters = []; particles = []; // Optional: Reset simulation on resize
      }
    </script>
  </body>
