<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waveform with Matching Grid Color</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111; /* Dark background for page */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script>
        // --- Configuration ---
        const GRID_ROWS = 11;
        const GRID_COLS = 30;
        const BLOCK_SIZE = 20; // Base size for layout calculations & grid lines
        const GRID_AREA_WIDTH = GRID_COLS * BLOCK_SIZE; // 600
        const GRID_AREA_HEIGHT = GRID_ROWS * BLOCK_SIZE; // 220
        const HUD_MARGIN_RIGHT = 180;
        const HUD_MARGIN_TOP = 0;
        const CANVAS_WIDTH = GRID_AREA_WIDTH + HUD_MARGIN_RIGHT; // 780
        const CANVAS_HEIGHT = GRID_AREA_HEIGHT + HUD_MARGIN_TOP; // 220

        // --- Waveform Configuration ---
        const noiseScaleX = 0.02;
        const waveformAmplitudeFactor = 0.8; // Max amplitude relative to available height inside border
        let timeOffset = 0;
        const timeIncrement = 0.15;
        const waveformBlockSize = 5;
        const waveformStepX = 10;
        const waveformBorderWeight = 10; // User's border thickness

        // --- Residuals Configuration ---
        let residualSquares = []; // Array to store {x, y, spawnTime}
        const residualSize = 5; // Size of residual squares
        const residualDuration = 600; // ms for residuals to fade

        // Colors (declare variables here, define in setup)
        let backgroundColor;
        let waveColor;
        let trackingBoxColor;
        let connectorLineColor;
        let hudTextColor;
        let qrOffColor;
        let waveformBorderColor;
        let gridLineColor; // Color for background grid

        // --- Tracking Boxes ---
        const numTrackers = 3;
        let trackedTargets = [];
        let previousTargets = [];
        let boxPositions = [];
        let isBoxTransitioning = [];
        let transitionStartTimes = [];
        let nextTrackTimes = [];

        const transitionDuration = 400;
        const minTrackDuration = 3000;
        const maxTrackDuration = 5000;
        const trackingBoxPadding = 2;
        const trackingBoxSize = BLOCK_SIZE - 2 * trackingBoxPadding; // 16
        const connectorLineWeight = 1.25;

        // Flashing state
        let isBoxFlashing = [];
        let flashStartTimes = [];
        const flashCycleTime = 200;
        const flashCycles = 3;
        const flashTotalDuration = flashCycleTime * flashCycles;

        // --- Top-Right HUD ---
        const hudCodeUpdateInterval = 5;
        let hudHex = "";
        let hudDecimal = "";
        const targetSentence = "Are we really who we say we are";
        const hexCharSubstitutionChance = 0.15;

        // --- QR Code Simulation ---
        const qrGridRows = 45;
        const qrGridCols = 45;
        const qrBlockSize = 3;
        const qrUpdateInterval = 4;
        let qrGrid = [];

        // --- p5.js Setup Function ---
        function setup() {
            createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
            frameRate(30);

            // --- Define Colors ---
            backgroundColor = color(0); // Black background
            waveColor = color(207, 184, 161); // Beige/Cream waveform blocks/residuals
            trackingBoxColor = color(245, 123, 71); // Orange tracker box
            connectorLineColor = color(245, 123, 71, 50); // Transparent Orange lines
            hudTextColor = color(207, 184, 161); // Beige/Cream HUD text
            qrOffColor = color(0); // Black QR 'off' blocks
            waveformBorderColor = color(207, 184, 161); // Match border to wave/HUD text color

            // MODIFIED: Set grid line color based on waveColor but with low alpha
            // Get RGB components of waveColor first
            let wc_r = red(waveColor);
            let wc_g = green(waveColor);
            let wc_b = blue(waveColor);
            gridLineColor = color(wc_r, wc_g, wc_b, 50); // Use wave color's RGB + low alpha (50)

            // Initialize the QR grid
            qrGrid = [];
            for (let r = 0; r < qrGridRows; r++) {
                qrGrid[r] = [];
                for (let c = 0; c < qrGridCols; c++) {
                    qrGrid[r][c] = floor(random(2));
                }
            }

            // Set text properties
            textAlign(CENTER, CENTER);
            textSize(12);
            textFont('monospace');

            // Initialize tracking state arrays
            let gridCenterX = GRID_AREA_WIDTH / 2;
            let gridCenterY = GRID_AREA_HEIGHT / 2;
            let centerPos = createVector(gridCenterX, gridCenterY);
            trackedTargets = []; previousTargets = []; boxPositions = [];
            isBoxTransitioning = []; transitionStartTimes = []; nextTrackTimes = [];
            isBoxFlashing = []; flashStartTimes = [];
            for (let i = 0; i < numTrackers; i++) {
                trackedTargets.push(centerPos.copy());
                previousTargets.push(centerPos.copy());
                boxPositions.push(centerPos.copy());
                isBoxTransitioning.push(false); transitionStartTimes.push(0);
                nextTrackTimes.push(millis() + 1000 + i * 500);
                isBoxFlashing.push(false); flashStartTimes.push(0);
            }
        }

         // --- Helper Functions ---
        function generateRandomBinary(len) { /* ... */ }
        function generateRandomHex(pairs) { /* ... */ }
        function generateRandomDecimal(len) { /* ... */ }
        function findWaveformPeaks(step = waveformStepX, minPeakThreshold = 0.2) { /* ... */ }
        // --- (Previous Helper Functions remain here) ---
        function generateRandomBinary(len) {
            let bin = '';
            for (let i = 0; i < len; i++) { bin += random() > 0.5 ? '1' : '0'; }
            return bin;
        }
        function generateRandomHex(pairs) {
            let hex = ''; const hexChars = '0123456789ABCDEF';
            for (let i = 0; i < pairs; i++) {
                let h1 = hexChars[floor(random(16))];
                if (random() < hexCharSubstitutionChance) { h1 = targetSentence.charAt(floor(random(targetSentence.length))); }
                let h2 = hexChars[floor(random(16))];
                 if (random() < hexCharSubstitutionChance) { h2 = targetSentence.charAt(floor(random(targetSentence.length))); }
                hex += h1 + h2 + ' ';
            } return hex.trim();
        }
        function generateRandomDecimal(len) {
            let dec = '';
            for (let i = 0; i < len; i++) { dec += floor(random(10)); }
            return dec;
        }
        function generateCaseID(r, c) { /* Defined but not used */ }
        function findWaveformPeaks(step = waveformStepX, minPeakThreshold = 0.2) {
            let peaks = [];
            let centerY = GRID_AREA_HEIGHT / 2;
            let halfWaveBlock = waveformBlockSize / 2;
            let halfBorder = waveformBorderWeight / 2;
            let minY = halfBorder + halfWaveBlock;
            let maxY = GRID_AREA_HEIGHT - halfBorder - halfWaveBlock;
            let currentAmplitude = (maxY - minY) / 2 * waveformAmplitudeFactor;
            let yValues = [];
            let minX = halfBorder + halfWaveBlock;
            let maxX = GRID_AREA_WIDTH - halfBorder - halfWaveBlock;
            for (let x = minX; x <= maxX; x += step) {
                 let noiseValue = noise(x * noiseScaleX, timeOffset);
                 let y = map(noiseValue, 0, 1, minY, maxY);
                 yValues.push({x: x, y: y});
            }
            for (let i = 1; i < yValues.length - 1; i++) {
                let prevY = yValues[i-1].y; let currY = yValues[i].y; let nextY = yValues[i+1].y;
                let currentX = yValues[i].x;
                let effectiveAmplitude = (maxY - minY) / 2;
                let isHighPeak = currY > prevY && currY > nextY && currY > centerY + effectiveAmplitude * minPeakThreshold;
                let isLowPeak = currY < prevY && currY < nextY && currY < centerY - effectiveAmplitude * minPeakThreshold;
                if (isHighPeak || isLowPeak) { peaks.push(createVector(currentX, currY)); }
            }
             // Edge case handling (commented out in user code, keep it that way)
            return peaks;
        }


        // --- p5.js Draw Function ---
        function draw() {
            // Initial check
            if (!boxPositions || boxPositions.length !== numTrackers || !qrGrid || qrGrid.length !== qrGridRows) {
                console.error("Trackers or QR Grid not initialized properly."); noLoop(); return;
            }

            background(backgroundColor); // Opaque background

            // --- Draw Background Scale Grid ---
            push();
            stroke(gridLineColor); // Use updated faint beige/cream color
            strokeWeight(0.5); // Thin lines

            // Vertical lines (within grid area)
            for (let x = 0; x <= GRID_AREA_WIDTH; x += BLOCK_SIZE) {
                line(x, 0, x, GRID_AREA_HEIGHT);
            }
            // Horizontal lines (within grid area)
            for (let y = 0; y <= GRID_AREA_HEIGHT; y += BLOCK_SIZE) {
                line(0, y, GRID_AREA_WIDTH, y);
            }
            pop();
            // --- End Grid ---

            // --- Draw Waveform Area Border --- (Draw AFTER grid)
            push();
            noFill();
            stroke(waveformBorderColor); // Use border color (Beige/Cream from user code)
            strokeWeight(waveformBorderWeight); // Use constant (10)
            rectMode(CORNER);
            rect(waveformBorderWeight / 2, waveformBorderWeight / 2,
                 GRID_AREA_WIDTH - waveformBorderWeight, GRID_AREA_HEIGHT - waveformBorderWeight);
            pop();
            // --- End Border ---

            // --- Update Data ---
            timeOffset += timeIncrement;

            // Update static HUD Code periodically
             if (frameCount % hudCodeUpdateInterval === 0) {
                hudHex = generateRandomHex(6);
                hudDecimal = generateRandomDecimal(18);
            }
            // Update QR Grid periodically
            if (frameCount % qrUpdateInterval === 0) {
                 for (let r = 0; r < qrGridRows; r++) {
                    if (!qrGrid[r]) qrGrid[r] = [];
                    for (let c = 0; c < qrGridCols; c++) {
                        qrGrid[r][c] = floor(random(2));
                    }
                }
            }

            // --- Update Trackers ---
            let currentTime = millis();
            let currentPeaks = null;

            for (let i = 0; i < numTrackers; i++) {
                // Timed Tracking Box Target Selection
                if (currentTime >= nextTrackTimes[i]) {
                    if (currentPeaks === null) { currentPeaks = findWaveformPeaks(waveformStepX); }
                    if (currentPeaks.length > 0) {
                        previousTargets[i].set(boxPositions[i]);
                        let newTargetPeak = random(currentPeaks);
                        trackedTargets[i].set(newTargetPeak);
                        isBoxTransitioning[i] = true; transitionStartTimes[i] = currentTime;
                        nextTrackTimes[i] = currentTime + random(minTrackDuration, maxTrackDuration);
                        isBoxFlashing[i] = false;
                    } else { nextTrackTimes[i] = currentTime + 500; }
                }

                // Update Animated Box Position
                if (isBoxTransitioning[i]) {
                    // ... (lerp logic remains the same) ...
                    let elapsed = currentTime - transitionStartTimes[i];
                    let t = constrain(elapsed / transitionDuration, 0, 1);
                    let startPos = previousTargets[i]; let endPos = trackedTargets[i];
                    if(boxPositions[i] && startPos && endPos) { boxPositions[i] = p5.Vector.lerp(startPos, endPos, t); }
                    else { console.error(`Position data invalid for tracker ${i} during lerp`); isBoxTransitioning[i] = false; }
                    if (t >= 1.0) {
                        isBoxTransitioning[i] = false;
                        if(boxPositions[i]) boxPositions[i].set(endPos);
                        if(flashStartTimes && flashStartTimes[i] !== undefined) { isBoxFlashing[i] = true; flashStartTimes[i] = currentTime; }
                    }
                } else {
                     if (trackedTargets[i]) { if(boxPositions[i]) { boxPositions[i].set(trackedTargets[i]); } }
                }

                 // Constrain Box Position within Border
                 if(boxPositions[i]){
                     let halfTrackingBox = trackingBoxSize / 2;
                     let minCoordX = waveformBorderWeight / 2 + halfTrackingBox;
                     let maxCoordX = GRID_AREA_WIDTH - waveformBorderWeight / 2 - halfTrackingBox;
                     let minCoordY = waveformBorderWeight / 2 + halfTrackingBox;
                     let maxCoordY = GRID_AREA_HEIGHT - waveformBorderWeight / 2 - halfTrackingBox;

                     boxPositions[i].x = constrain(boxPositions[i].x, minCoordX, maxCoordX);
                     boxPositions[i].y = constrain(boxPositions[i].y, minCoordY, maxCoordY);
                 }

            } // End tracker update loop


            // --- Draw Waveform Blocks ---
            let centerY = GRID_AREA_HEIGHT / 2;
            let halfBorder = waveformBorderWeight / 2;
            let halfWaveBlock = waveformBlockSize / 2;
            let minX = halfBorder + halfWaveBlock;
            let maxX = GRID_AREA_WIDTH - halfBorder - halfWaveBlock;
            let minY = halfBorder + halfWaveBlock;
            let maxY = GRID_AREA_HEIGHT - halfBorder - halfWaveBlock;

            push();
            fill(waveColor); noStroke(); rectMode(CENTER);
            for (let x = minX; x <= maxX; x += waveformStepX) {
                let noiseValue = noise(x * noiseScaleX, timeOffset);
                let blockCenterY = map(noiseValue, 0, 1, minY, maxY);
                square(x, blockCenterY, waveformBlockSize);
                residualSquares.push({ x: x, y: blockCenterY, spawnTime: currentTime });
            }
            pop();
            // --- End Waveform Blocks ---


             // --- Draw Connecting Lines ---
             if (boxPositions.length === numTrackers && boxPositions.every(p => p !== undefined)) {
                push();
                stroke(connectorLineColor); strokeWeight(connectorLineWeight);
                line(boxPositions[0].x, boxPositions[0].y, boxPositions[1].x, boxPositions[1].y);
                line(boxPositions[1].x, boxPositions[1].y, boxPositions[2].x, boxPositions[2].y);
                line(boxPositions[2].x, boxPositions[2].y, boxPositions[0].x, boxPositions[0].y);
                pop();
             }

            // --- Draw and Update Residuals ---
            push();
            rectMode(CENTER); noStroke();
            for (let i = residualSquares.length - 1; i >= 0; i--) {
                let sq = residualSquares[i];
                let elapsed = currentTime - sq.spawnTime;
                if (elapsed > residualDuration) { residualSquares.splice(i, 1); }
                else {
                    let alpha = map(elapsed, 0, residualDuration, 200, 0);
                    fill(red(waveColor), green(waveColor), blue(waveColor), alpha);
                    square(sq.x, sq.y, residualSize);
                }
            }
            pop();


            // --- Draw Tracking Boxes (with Flashing Logic) ---
            for (let i = 0; i < numTrackers; i++) {
                 if (boxPositions[i] && isBoxFlashing[i] !== undefined && flashStartTimes[i] !== undefined) {
                     let drawThisBox = true;
                     if (isBoxFlashing[i]) {
                         let flashElapsed = currentTime - flashStartTimes[i];
                         if (flashElapsed < flashTotalDuration) {
                             let cycleProgress = (flashElapsed % flashCycleTime);
                             if (cycleProgress > flashCycleTime / 2) { drawThisBox = false; }
                         } else { isBoxFlashing[i] = false; }
                     }
                     if (drawThisBox) {
                         push();
                         noFill(); stroke(trackingBoxColor); strokeWeight(1.5); rectMode(CENTER);
                         square(boxPositions[i].x, boxPositions[i].y, trackingBoxSize);
                         pop();
                     }
                 }
            }

            // --- Draw Top-Right HUD ---
            push();
            fill(hudTextColor); noStroke(); textAlign(LEFT, TOP); textFont('monospace', 12);
            let hudX = GRID_AREA_WIDTH + 15; let hudY = 15;
            textSize(14); text("DECRYPTING CYPHER", hudX, hudY);
            hudY += 18; textSize(11); text(`HEX: ${hudHex}`, hudX, hudY);
            hudY += 14; text(`DEC: ${hudDecimal}`, hudX, hudY);
            hudY += 16;
            // Draw QR Code Simulation
            let qrX = hudX; let qrY = hudY;
            rectMode(CORNER); noStroke();
            for (let r = 0; r < qrGridRows; r++) {
                for (let c = 0; c < qrGridCols; c++) {
                    if (qrGrid[r] && qrGrid[r][c] !== undefined) {
                        if (qrGrid[r][c] === 1) { fill(hudTextColor); }
                        else { fill(qrOffColor); }
                        square(qrX + c * qrBlockSize, qrY + r * qrBlockSize, qrBlockSize);
                    }
                }
            }
            pop();

        } // End draw


        // --- p5.js Window Resized Function ---
        // Removed resize handling for fixed canvas size
        // function windowResized() { ... }

    </script>
</body>
</html>
