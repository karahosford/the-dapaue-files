<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waveform with Matching Grid Color</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111; /* Dark background for page */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script>
const waveformSketch = ( p ) => {

// --- Configuration ---
const GRID_ROWS = 11;
const GRID_COLS = 30;
const BLOCK_SIZE = 20; // Base size for layout calculations
const GRID_AREA_WIDTH = GRID_COLS * BLOCK_SIZE; // 600
const GRID_AREA_HEIGHT = GRID_ROWS * BLOCK_SIZE; // 220
const HUD_MARGIN_RIGHT = 180;
const HUD_MARGIN_TOP = 0;
const CANVAS_WIDTH = GRID_AREA_WIDTH + HUD_MARGIN_RIGHT; // 780
const CANVAS_HEIGHT = GRID_AREA_HEIGHT + HUD_MARGIN_TOP; // 220

// --- Waveform Configuration ---
const noiseScaleX = 0.02;
const waveformAmplitudeFactor = 0.8;
let timeOffset = 0;
const timeIncrement = 0.15;
const waveformBlockSize = 5;
const waveformStepX = 10;
const waveformBorderWeight = 10;

// --- Residuals Configuration ---
let residualSquares = [];
const residualSize = 5;
const residualDuration = 600;

// Colors (declare variables here, define in setup)
let backgroundColor;
let waveColor;
let trackingBoxColor;
let connectorLineColor;
let hudTextColor;
let qrOffColor;
let waveformBorderColor;
let gridLineColor;

// --- Tracking Boxes ---
const numTrackers = 3;
let trackedTargets = [];
let previousTargets = [];
let boxPositions = [];
let isBoxTransitioning = [];
let transitionStartTimes = [];
let nextTrackTimes = [];

const transitionDuration = 400;
const minTrackDuration = 3000;
const maxTrackDuration = 5000;
const trackingBoxPadding = 2;
const trackingBoxSize = BLOCK_SIZE - 2 * trackingBoxPadding; // 16
const connectorLineWeight = 1.25;

// Flashing state
let isBoxFlashing = [];
let flashStartTimes = [];
const flashCycleTime = 200;
const flashCycles = 3;
const flashTotalDuration = flashCycleTime * flashCycles;

// --- Top-Right HUD ---
const hudCodeUpdateInterval = 5;
let hudHex = "";
let hudDecimal = "";
const targetSentence = "Are we really who we say we are";
const hexCharSubstitutionChance = 0.15;

// --- QR Code Simulation ---
const qrGridRows = 45;
const qrGridCols = 55;
const qrBlockSize = 3;
const qrUpdateInterval = 4;
let qrGrid = [];

// --- p5.js Setup Function ---
p.setup = () => {
  p.createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
  p.frameRate(30);

  // --- Define Colors ---
  // Use p.color() in instance mode
  backgroundColor = p.color(22, 22, 24);
  waveColor = p.color(191, 185, 168); // Beige/Cream
  trackingBoxColor = p.color(245, 123, 71); // Orange
  connectorLineColor = p.color(245, 123, 71, 50); // Transparent Orange
  hudTextColor = p.color(191, 185, 168); // Beige/Cream
  qrOffColor = p.color(22, 22, 24);
  waveformBorderColor = p.color(191, 185, 168); // Match border to wave/HUD text color
  // Use p.red(), p.green(), p.blue() in instance mode
  gridLineColor = p.color(p.red(waveColor), p.green(waveColor), p.blue(waveColor), 50);

  // Initialize the QR grid
  qrGrid = [];
  for (let r = 0; r < qrGridRows; r++) {
      qrGrid[r] = [];
      for (let c = 0; c < qrGridCols; c++) {
          qrGrid[r][c] = p.floor(p.random(2));
      }
  }

  // Set text properties
  p.textAlign(p.CENTER, p.CENTER);
  p.textSize(12);
  p.textFont('monospace');

  // Initialize tracking state arrays
  let gridCenterX = GRID_AREA_WIDTH / 2;
  let gridCenterY = GRID_AREA_HEIGHT / 2;
  let centerPos = p.createVector(gridCenterX, gridCenterY); // Use p.createVector
  trackedTargets = []; previousTargets = []; boxPositions = [];
  isBoxTransitioning = []; transitionStartTimes = []; nextTrackTimes = [];
  isBoxFlashing = []; flashStartTimes = [];
  for (let i = 0; i < numTrackers; i++) {
      trackedTargets.push(centerPos.copy());
      previousTargets.push(centerPos.copy());
      boxPositions.push(centerPos.copy());
      isBoxTransitioning.push(false); transitionStartTimes.push(0);
      nextTrackTimes.push(p.millis() + 1000 + i * 500); // Use p.millis()
      isBoxFlashing.push(false); flashStartTimes.push(0);
  }
  console.log("p5 Waveform Sketch Setup Complete");
};

 // --- Helper Functions ---
 // Note: random(), floor(), etc. need p. prefix inside sketch methods
 // These helpers are called from draw, so they need p passed or defined globally
 // For simplicity here, assume they are called ONLY from draw/setup where 'p' is defined
 const generateRandomBinary = (len) => {
     let bin = '';
     for (let i = 0; i < len; i++) { bin += p.random() > 0.5 ? '1' : '0'; }
     return bin;
 };
 const generateRandomHex = (pairs) => {
     let hex = ''; const hexChars = '0123456789ABCDEF';
     for (let i = 0; i < pairs; i++) {
         let h1 = hexChars[p.floor(p.random(16))];
         if (p.random() < hexCharSubstitutionChance) { h1 = targetSentence.charAt(p.floor(p.random(targetSentence.length))); }
         let h2 = hexChars[p.floor(p.random(16))];
          if (p.random() < hexCharSubstitutionChance) { h2 = targetSentence.charAt(p.floor(p.random(targetSentence.length))); }
         hex += h1 + h2 + ' ';
     } return hex.trim();
 };
 const generateRandomDecimal = (len) => {
     let dec = '';
     for (let i = 0; i < len; i++) { dec += p.floor(p.random(10)); }
     return dec;
 };

 // --- Function to find peaks/troughs in the waveform ---
 const findWaveformPeaks = (step = waveformStepX, minPeakThreshold = 0.2) => {
     let peaks = [];
     let centerY = GRID_AREA_HEIGHT / 2;
     let halfWaveBlock = waveformBlockSize / 2;
     let halfBorder = waveformBorderWeight / 2;
     let minY = halfBorder + halfWaveBlock;
     let maxY = GRID_AREA_HEIGHT - halfBorder - halfWaveBlock;
     let currentAmplitude = (maxY - minY) / 2 * waveformAmplitudeFactor;
     let yValues = [];
     let minX = halfBorder + halfWaveBlock;
     let maxX = GRID_AREA_WIDTH - halfBorder - halfWaveBlock;
     for (let x = minX; x <= maxX; x += step) {
          let noiseValue = p.noise(x * noiseScaleX, timeOffset); // Use p.noise()
          let y = p.map(noiseValue, 0, 1, minY, maxY); // Use p.map()
          yValues.push({x: x, y: y});
     }
     for (let i = 1; i < yValues.length - 1; i++) {
         let prevY = yValues[i-1].y; let currY = yValues[i].y; let nextY = yValues[i+1].y;
         let currentX = yValues[i].x;
         let effectiveAmplitude = (maxY - minY) / 2;
         let isHighPeak = currY > prevY && currY > nextY && currY > centerY + effectiveAmplitude * minPeakThreshold;
         let isLowPeak = currY < prevY && currY < nextY && currY < centerY - effectiveAmplitude * minPeakThreshold;
         if (isHighPeak || isLowPeak) { peaks.push(p.createVector(currentX, currY)); } // Use p.createVector
     }
      // Edge case handling...
     return peaks;
 };


// --- p5.js Draw Function ---
p.draw = () => {
  // Use p. prefix for all p5 functions/variables
  if (!boxPositions || boxPositions.length !== numTrackers || !qrGrid || qrGrid.length !== qrGridRows) {
      console.error("Trackers or QR Grid not initialized properly."); p.noLoop(); return;
  }

  p.background(backgroundColor);

  // --- Draw Background Scale Grid ---
  p.push();
  p.stroke(gridLineColor); p.strokeWeight(0.5);
  for (let x = 0; x <= GRID_AREA_WIDTH; x += BLOCK_SIZE) { p.line(x, 0, x, GRID_AREA_HEIGHT); }
  for (let y = 0; y <= GRID_AREA_HEIGHT; y += BLOCK_SIZE) { p.line(0, y, GRID_AREA_WIDTH, y); }
  p.pop();

  // --- Draw Waveform Area Border ---
  p.push();
  p.noFill(); p.stroke(waveformBorderColor); p.strokeWeight(waveformBorderWeight); p.rectMode(p.CORNER);
  p.rect(waveformBorderWeight / 2, waveformBorderWeight / 2,
         GRID_AREA_WIDTH - waveformBorderWeight, GRID_AREA_HEIGHT - waveformBorderWeight);
  p.pop();

  // --- Update Data ---
  timeOffset += timeIncrement;

  if (p.frameCount % hudCodeUpdateInterval === 0) {
      hudHex = generateRandomHex(6);
      hudDecimal = generateRandomDecimal(18);
  }
  if (p.frameCount % qrUpdateInterval === 0) {
       for (let r = 0; r < qrGridRows; r++) {
          if (!qrGrid[r]) qrGrid[r] = [];
          for (let c = 0; c < qrGridCols; c++) {
              qrGrid[r][c] = p.floor(p.random(2));
          }
      }
  }

  // --- Update Trackers ---
  let currentTime = p.millis();
  let currentPeaks = null;

  for (let i = 0; i < numTrackers; i++) {
      // Target Selection
      if (currentTime >= nextTrackTimes[i]) {
          if (currentPeaks === null) { currentPeaks = findWaveformPeaks(waveformStepX); }
          if (currentPeaks.length > 0) {
              if(previousTargets[i] && boxPositions[i]) previousTargets[i].set(boxPositions[i]);
              else previousTargets[i] = p.createVector(p.width/2, p.height/2);

              let newTargetPeak = p.random(currentPeaks); // Use p.random()
              if(trackedTargets[i]) trackedTargets[i].set(newTargetPeak);
              else trackedTargets[i] = newTargetPeak.copy();

              isBoxTransitioning[i] = true; transitionStartTimes[i] = currentTime;
              nextTrackTimes[i] = currentTime + p.random(minTrackDuration, maxTrackDuration); // Use p.random()
              isBoxFlashing[i] = false;
          } else { nextTrackTimes[i] = currentTime + 500; }
      }

      // Box Position Update
      if (isBoxTransitioning[i]) {
          let elapsed = currentTime - transitionStartTimes[i];
          let t = p.constrain(elapsed / transitionDuration, 0, 1); // Use p.constrain()
          let startPos = previousTargets[i]; let endPos = trackedTargets[i];
          if(boxPositions[i] && startPos && endPos) {
               // Use p5.Vector.lerp static method
               boxPositions[i] = p5.Vector.lerp(startPos, endPos, t);
          } else { isBoxTransitioning[i] = false; }
          if (t >= 1.0) {
              isBoxTransitioning[i] = false;
              if(boxPositions[i] && endPos) boxPositions[i].set(endPos);
              if(flashStartTimes && isBoxFlashing[i] !== undefined) { isBoxFlashing[i] = true; flashStartTimes[i] = currentTime; }
          }
      } else {
           if (trackedTargets[i] && boxPositions[i]) { boxPositions[i].set(trackedTargets[i]); }
      }

       // Constrain Box Position
       if(boxPositions[i]){
           let halfTrackingBox = trackingBoxSize / 2;
           let minCoordX = waveformBorderWeight / 2 + halfTrackingBox;
           let maxCoordX = GRID_AREA_WIDTH - waveformBorderWeight / 2 - halfTrackingBox;
           let minCoordY = waveformBorderWeight / 2 + halfTrackingBox;
           let maxCoordY = GRID_AREA_HEIGHT - waveformBorderWeight / 2 - halfTrackingBox;
           // Use p.constrain()
           boxPositions[i].x = p.constrain(boxPositions[i].x, minCoordX, maxCoordX);
           boxPositions[i].y = p.constrain(boxPositions[i].y, minCoordY, maxCoordY);
       }
  } // End tracker update loop


  // --- Draw Waveform Blocks ---
  let centerY = GRID_AREA_HEIGHT / 2;
  let halfBorder = waveformBorderWeight / 2;
  let halfWaveBlock = waveformBlockSize / 2;
  let minX = halfBorder + halfWaveBlock;
  let maxX = GRID_AREA_WIDTH - halfBorder - halfWaveBlock;
  let minY = halfBorder + halfWaveBlock;
  let maxY = GRID_AREA_HEIGHT - halfBorder - halfWaveBlock;

  p.push();
  p.fill(waveColor); p.noStroke(); p.rectMode(p.CENTER);
  for (let x = minX; x <= maxX; x += waveformStepX) {
      let noiseValue = p.noise(x * noiseScaleX, timeOffset); // Use p.noise()
      let blockCenterY = p.map(noiseValue, 0, 1, minY, maxY); // Use p.map()
      p.square(x, blockCenterY, waveformBlockSize);
      residualSquares.push({ x: x, y: blockCenterY, spawnTime: currentTime });
  }
  p.pop();

   // --- Draw Connecting Lines ---
   if (boxPositions.length === numTrackers && boxPositions.every(pos => pos !== undefined)) {
      p.push();
      p.stroke(connectorLineColor); p.strokeWeight(connectorLineWeight);
      p.line(boxPositions[0].x, boxPositions[0].y, boxPositions[1].x, boxPositions[1].y);
      p.line(boxPositions[1].x, boxPositions[1].y, boxPositions[2].x, boxPositions[2].y);
      p.line(boxPositions[2].x, boxPositions[2].y, boxPositions[0].x, boxPositions[0].y);
      p.pop();
   }

  // --- Draw and Update Residuals ---
  p.push();
  p.rectMode(p.CENTER); p.noStroke();
  for (let i = residualSquares.length - 1; i >= 0; i--) {
      let sq = residualSquares[i];
      let elapsed = currentTime - sq.spawnTime;
      if (elapsed > residualDuration) { residualSquares.splice(i, 1); }
      else {
          let alpha = p.map(elapsed, 0, residualDuration, 200, 0); // Use p.map()
          // Use p.red(), p.green(), p.blue()
          p.fill(p.red(waveColor), p.green(waveColor), p.blue(waveColor), alpha);
          p.square(sq.x, sq.y, residualSize);
      }
  }
  p.pop();


  // --- Draw Tracking Boxes (with Flashing Logic) ---
  for (let i = 0; i < numTrackers; i++) {
       if (boxPositions[i] && isBoxFlashing[i] !== undefined && flashStartTimes[i] !== undefined) {
           let drawThisBox = true;
           if (isBoxFlashing[i]) {
               let flashElapsed = currentTime - flashStartTimes[i];
               if (flashElapsed < flashTotalDuration) {
                   let cycleProgress = (flashElapsed % flashCycleTime);
                   if (cycleProgress > flashCycleTime / 2) { drawThisBox = false; }
               } else { isBoxFlashing[i] = false; }
           }
           if (drawThisBox) {
               p.push();
               p.noFill(); p.stroke(trackingBoxColor); p.strokeWeight(1.5); p.rectMode(p.CENTER);
               p.square(boxPositions[i].x, boxPositions[i].y, trackingBoxSize);
               p.pop();
           }
       }
  }

  // --- Draw Top-Right HUD ---
  p.push();
  p.fill(hudTextColor); p.noStroke(); p.textAlign(p.LEFT, p.TOP); p.textFont('monospace', 12);
  let hudX = GRID_AREA_WIDTH + 15; let hudY = 15;
  p.textSize(14); p.text("DECRYPTING CYPHER", hudX, hudY);
  hudY += 18; p.textSize(11); p.text(`HEX: ${hudHex}`, hudX, hudY);
  hudY += 14; p.text(`DEC: ${hudDecimal}`, hudX, hudY);
  hudY += 16;
  // Draw QR Code Simulation
  let qrX = hudX; let qrY = hudY;
  p.rectMode(p.CORNER); p.noStroke();
  for (let r = 0; r < qrGridRows; r++) {
      for (let c = 0; c < qrGridCols; c++) {
          if (qrGrid[r] && qrGrid[r][c] !== undefined) {
              if (qrGrid[r][c] === 1) { p.fill(hudTextColor); }
              else { p.fill(qrOffColor); }
              p.square(qrX + c * qrBlockSize, qrY + r * qrBlockSize, qrBlockSize);
          }
      }
  }
  p.pop();

}; // End p.draw()

}; // End sketch function

// --- Create p5 instance ---
// Ensure the container ID matches the one in your HTML
new p5(waveformSketch, 'p5-waveform-container');


    </script>
</body>
</html>
